name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  build:
    name: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: logistics
          POSTGRES_USER: migrator
          POSTGRES_PASSWORD: migrator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U migrator -d logistics"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/logistics
      DATABASE_USER: migrator
      DATABASE_PASSWORD: migrator
      JWT_SECRET: ZGV2LW9ubHktand0LXNlY3JldC1jaGFuZ2UtbWUtaW4tcHJvZC1iYXNlNjQ=
      SENTRY_DSN: ''
      SPRING_PROFILES_ACTIVE: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/.mvn/wrapper/maven-wrapper.properties

      - name: Validate wrapper
        run: ./mvnw -v

      - name: Resolve dependencies
        run: ./mvnw -B -q dependency:go-offline

      - name: Run unit + integration tests
        run: ./mvnw -B verify

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
          retention-days: 14
          if-no-files-found: ignore
