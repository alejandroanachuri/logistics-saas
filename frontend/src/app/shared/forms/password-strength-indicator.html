<div
  class="mt-2 flex items-center gap-2"
  [attr.aria-label]="ariaLabel()"
  data-testid="password-strength-indicator"
>
  @if (tier() === null) {
    <div
      class="h-1.5 flex-1 rounded bg-slate-200"
      data-strength="empty"
      aria-hidden="true"
    ></div>
    <span class="sr-only">Ingresá una contraseña para ver su fuerza</span>
  } @else {
    <div class="flex flex-1 gap-1" data-strength="bar">
      @for (i of [1, 2, 3]; track i) {
        <div
          class="h-1.5 flex-1 rounded transition-colors"
          [class.bg-red-500]="i <= filledSegments() && tier() === 'Débil'"
          [class.bg-yellow-500]="i <= filledSegments() && tier() === 'Aceptable'"
          [class.bg-green-500]="i <= filledSegments() && tier() === 'Fuerte'"
          [class.bg-slate-200]="i > filledSegments()"
          aria-hidden="true"
        ></div>
      }
    </div>
    <span
      class="text-xs font-medium"
      [class.text-red-600]="tier() === 'Débil'"
      [class.text-yellow-600]="tier() === 'Aceptable'"
      [class.text-green-600]="tier() === 'Fuerte'"
      data-strength-tier
    >
      {{ tier() }}
    </span>
  }
</div>
