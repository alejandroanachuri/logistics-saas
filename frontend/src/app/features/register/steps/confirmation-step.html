<section class="w-full max-w-2xl" data-testid="confirmation-step">
  <h2 class="text-xl font-semibold text-slate-900">Confirmación</h2>
  <p class="mt-1 text-sm text-slate-600">Revisá los datos ingresados antes de crear la cuenta.</p>

  <form [formGroup]="form" (ngSubmit)="$event.preventDefault()" novalidate class="mt-6 space-y-6">
    <fieldset class="space-y-2 rounded-md border border-slate-200 p-4">
      <legend class="px-1 text-sm font-semibold text-slate-700">Empresa</legend>
      <dl class="grid grid-cols-1 gap-x-4 gap-y-2 sm:grid-cols-2" data-testid="company-summary">
        @for (item of companySummary(); track item.label) {
          <div>
            <dt class="text-xs font-medium text-slate-500">{{ item.label }}</dt>
            <dd class="text-sm text-slate-900">{{ item.value }}</dd>
          </div>
        }
      </dl>
    </fieldset>

    <fieldset class="space-y-2 rounded-md border border-slate-200 p-4">
      <legend class="px-1 text-sm font-semibold text-slate-700">Administrador</legend>
      <dl class="grid grid-cols-1 gap-x-4 gap-y-2 sm:grid-cols-2" data-testid="admin-summary">
        @for (item of adminSummary(); track item.label) {
          <div>
            <dt class="text-xs font-medium text-slate-500">{{ item.label }}</dt>
            <dd class="text-sm text-slate-900">{{ item.value }}</dd>
          </div>
        }
      </dl>
      <!--
        SECURITY: the password / passwordConfirmation values
        are NEVER rendered. The adminSummary computed excludes
        them (see confirmation-step.ts).
      -->
    </fieldset>

    <fieldset class="space-y-3">
      <legend class="text-sm font-semibold text-slate-700">Consentimientos</legend>
      <label class="flex items-start gap-2 text-sm text-slate-700">
        <input
          type="checkbox"
          formControlName="acceptsTerms"
          data-testid="consent-terms"
          class="mt-0.5 h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-500"
        />
        <span>
          Acepto los
          <a href="#" class="font-medium text-slate-900 underline">Términos y Condiciones</a>
        </span>
      </label>
      <label class="flex items-start gap-2 text-sm text-slate-700">
        <input
          type="checkbox"
          formControlName="acceptsPrivacy"
          data-testid="consent-privacy"
          class="mt-0.5 h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-500"
        />
        <span>
          Acepto la
          <a href="#" class="font-medium text-slate-900 underline">Política de Privacidad</a>
        </span>
      </label>
    </fieldset>
  </form>
</section>
